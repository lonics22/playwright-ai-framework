[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    ai: 标记 AI 驱动测试（需要 LLM 配置）
    hybrid: 标记混合模式测试
    slow: 标记慢速测试
    smoke: 标记冒烟测试
    regression: 标记回归测试
    e2e: 标记端到端测试
    api: 标记 API 测试
    ui: 标记 UI 测试
    self_healing: 标记自我修复定位测试
    visual: 标记视觉回归测试

addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results

asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# 并发执行配置
# 使用: pytest -n auto
xdist_auto_workers = 4
